background {
    monitor =
    path = ~/Pictures/wallpapers/stanczyk.jpg
    blur_passes = 2
    blur_size = 4
    brightness = 0.4
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    outer_color = rgb(880000)
    inner_color = rgb(0a0a0a)
    font_color = rgb(cc0000)
    fade_on_empty = true
    placeholder_text = <i>contraseña...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(cc0000ff)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}
